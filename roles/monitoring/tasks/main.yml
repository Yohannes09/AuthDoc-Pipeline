- name: Ensure monitoring directory exists on host
  file:
    path: "{{ monitoring_dir }}"
    state: directory
    mode: '0755'

- name: Copy monitoring docker-compose.yml to host
  copy:
    src: docker-compose.yml
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'

- name: Building monitoring infrastructure
  shell: docker compose up -d
  args:
    chdir: "{{ monitoring_dir }}"
  environment:
    GRAFANA_PASSWORD: "{{ GRAFANA_PASSWORD }}"