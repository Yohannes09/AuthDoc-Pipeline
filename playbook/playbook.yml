- name: Deploy authmat + dockeep infra with Docker Compose
  hosts: targets
  become: yes
  vars_files:
    - group_vars/shared_configs.yml
    - group_vars/infra_configs.yml
    - group_vars/authmat_secrets.yml
    - group_vars/dockeep_secrets.yml
    - group_vars/dockeep_configs.yml
    - group_vars/monitoring_secrets.yml

  vars:
    infra_dir: "opt/infra"
    authmat_dir: "opt/auth"
    dockeep_dir: "opt/doc"
    monitoring_dir: "opt/monitoring"

  # Roles execute in order before tasks.
  roles:
    - common
    - infrastructure
    - authmat
    - dockeep
    - monitoring

  tasks:
    - name: Verify services are running
      command: docker ps
      register: docker_output
      failed_when: docker_output.rc != 0

    - name: Display running containers
      debug:
        var: docker_output.stdout_lines