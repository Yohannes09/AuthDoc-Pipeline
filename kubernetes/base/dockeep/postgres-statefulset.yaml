# DOCKEEP

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dockeep-db-deployment-h
spec:
  serviceName: "dockeep-db-service-h"
  replicas: 1
  selector:
    matchLabels:
      app: dockeep-db
  template:
    metadata:
      labels:
        app: dockeep-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: dockeep-db-data
              mountPath: /var/lib/postgresql/data
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: password

  volumeClaimTemplates:
    - metadata:
        name: dockeep-db-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi