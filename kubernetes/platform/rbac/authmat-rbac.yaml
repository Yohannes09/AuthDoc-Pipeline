apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authmat
  namespace: authmat
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authmat
  namespace: authmat
subjects:
  - kind: ServiceAccount
    name: authmat
    namespace: authmat
roleRef:
  kind: Role
  name: authmat
  apiGroup: rbac.authorization.k8s.io