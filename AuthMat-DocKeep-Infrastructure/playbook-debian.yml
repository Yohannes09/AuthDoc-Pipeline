- name: Deploy authmat + dockeep infra with Docker Compose
  hosts: targets  # Matches the group in inventory.ini
  become: yes  # Use sudo for tasks requiring elevated privileges (e.g., installing packages, Docker)
  vars_files:
    - group_vars/infra_secrets.yml
    - group_vars/authmat_secrets.yml
    - group_vars/dockeep_secrets.yml
  vars:
    deployment_dir: /opt/deployment  # Directory on target host for repo clones
    infra_repo_url: https://github.com/Yohannes09/Infrastructure
    authmat_repo_url: https://github.com/Yohannes09/AuthMat
    dockeep_repo_url: https://github.com/Yohannes09/DocKeep
    repo_branch: main
    docker_network: shared-net
    kafka_bootstrap_server: "{{ KAFKA_HOST }}:{{ KAFKA_PORT }}"


  tasks:
    - name: Install Docker, Compose, and Git on Debian-based systems
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - git
        state: present
        update_cache: yes
      when: ansible_os_family == 'Debian'


    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes
      when: ansible_os_family != 'Darwin'


    - name: Create deployment directory
      file:
        path: "{{ deployment_dir }}"
        state: directory
        mode: '0755'


    - name: Clone infra repo
      git:
        repo: "{{ infra_repo_url }}"
        dest: "{{ deployment_dir }}"
        version: "{{ repo_branch }}"
        force: yes
        accept_hostkey: yes
      register: infra_clone


    - name: Clone authmat repo
      git:
        repo: "{{ authmat_repo_url }}"
        dest: "{{ deployment_dir }}"
        force: yes
        accept_hostkey: yes
      register: authmat_clone


    - name: Clone dockeep repo
      git:
        repo: "{{ dockeep_repo_url }}"
        dest: "{{ deployment_dir }}"
        version: "{{ repo_branch }}"
        force: yes
        accept_hostkey: yes
      register: dockeep_clone


    - name: Building and containerizing Infrastructure
      community.docker.docker_compose_v2:
        project_src: "{{ deployment_dir }}/Infrastructure/AuthMat-DocKeep-Infrastructure"
        files:
          - "docker-compose.yml"
        state: present
        build: never
        environment:
          REDIS_IMAGE: "{{ REDIS_IMAGE }}"
          REDIS_PORT: "{{ REDIS_PORT }}"
          KAFKA_IMAGE: "{{ KAFKA_IMAGE }}"
          KAFKA_PORT: "{{ KAFKA_PORT }}"

        pull: missing
        recreate: auto
        remove_orphans: true
        wait: true
        wait_timeout: 300
      register: compose_result


    - name: Building and containerizing AuthMat
      community.docker.docker_compose_v2:
        project_src: "{{ deployment_dir }}/AuthMat/"
        files:
          - "docker-compose.yml"
        state: present
        build: always
        environment:
          KAFKA_BOOTSTRAP_SERVERS: "{{ kafka_bootstrap_server }}"
          REDIS_HOST: "{{ REDIS_HOST }}"
          REDIS_PORT: "{{ REDIS_PORT }}"

          DB_NAME: "{{ AUTH_DB_NAME }}"
          DB_URL: "{{ AUTH_DB_URL }}"
          DB_USERNAME: "{{ AUTH_DB_USERNAME }}"
          DB_PASSWORD: "{{ AUTH_DB_PASSWORD }}"
          DB_DRIVER: "{{ AUTH_DB_DRIVER }}"
          DB_MAX_POOL_SIZE: "{{ AUTH_DB_MAX_POOL_SIZE }}"
          DB_MIN_IDLE_CONNECTIONS: "{{ AUTH_DB_MIN_IDLE_CONNECTIONS }}"
          DB_IDLE_TIMEOUT_MS: "{{ AUTH_DB_IDLE_TIMEOUT_MS }}"
          DB_MAX_LIFETIME_MS: "{{ AUTH_DB_MAX_LIFETIME_MS }}"

          ACCESS_TOKEN_VALIDITY_MINUTES: "{{ ACCESS_TOKEN_VALIDITY_MINUTES }}"
          ACCESS_TOKEN_HISTORY_TRACE: "{{ ACCESS_TOKEN_HISTORY_TRACE }}"
          ACCESS_TOKEN_KEY_SIZE: "{{ ACCESS_TOKEN_KEY_SIZE }}"
          ACCESS_TOKEN_KEY_ALGORITHM: "{{ ACCESS_TOKEN_KEY_ALGORITHM }}"
          ACCESS_TOKEN_JWT_ALGORITHM: "{{ ACCESS_TOKEN_JWT_ALGORITHM }}"
          ACCESS_TOKEN_SIGNING_KEY_ROTATION_RATE_MINUTES: "{{ ACCESS_TOKEN_SIGNING_KEY_ROTATION_MINUTES }}"

          REFRESH_TOKEN_VALIDITY_MINUTES: "{{ REFRESH_TOKEN_VALIDITY_MINUTES }}"
          REFRESH_TOKEN_HISTORY_TRACE: "{{ REFRESH_TOKEN_HISTORY_TRACE }}"
          REFRESH_TOKEN_KEY_SIZE: "{{ REFRESH_TOKEN_KEY_SIZE }}"
          REFRESH_TOKEN_KEY_ALGORITHM: "{{ REFRESH_TOKEN_KEY_ALGORITHM }}"
          REFRESH_TOKEN_JWT_ALGORITHM: "{{ REFRESH_TOKEN_JWT_ALGORITHM }}"
          REFRESH_TOKEN_SIGNING_KEY_ROTATION_RATE_MINUTES: "{{ REFRESH_TOKEN_SIGNING_KEY_ROTATION_MINUTES }}"
        pull: missing
        recreate: auto
        remove_orphans: true
        wait: true
        wait_timeout: 300


    - name: Building and containerizing DocKeep
      community.docker.docker_compose_v2:
        project_src: "{{ deployment_dir }}/DocKeep/"
        files:
          - "docker-compose.yml"
        state: present
        build: always
        environment:
          KAFKA_BOOTSTRAP_SERVERS: "{{ kafka_bootstrap_server }}"
          REDIS_HOST: "{{ REDIS_HOST }}"
          REDIS_PORT: "{{ REDIS_PORT }}"

          DB_NAME: "{{ DOC_DB_NAME }}"
          DB_URL: "{{ DOC_DB_URL }}"
          DB_USERNAME: "{{ DOC_DB_USERNAME }}"
          DB_PASSWORD: "{{ DOC_DB_PASSWORD }}"
          DB_DRIVER: "{{ DOC_DB_DRIVER }}"
          DB_MAX_POOL_SIZE: "{{ DOC_DB_MAX_POOL_SIZE }}"
          DB_MIN_IDLE_CONNECTIONS: "{{ DOC_DB_MIN_IDLE_CONNECTIONS }}"
          DB_IDLE_TIMEOUT_MS: "{{ DOC_DB_IDLE_TIMEOUT_MS }}"
          DB_MAX_LIFETIME_MS: "{{ DOC_DB_MAX_LIFETIME_MS }}"

          AWS_ACCESS_KEY: "{{ AWS_ACCESS_KEY }}"
          AWS_SECRET_KEY: "{{ AWS_SECRET_KEY }}"
          AWS_REGION: "{{ AWS_REGION }}"
          AWS_BUCKET_NAME: "{{ AWS_BUCKET_NAME }}"

        pull: missing
        recreate: auto
        remove_orphans: true
        wait: true
        wait_timeout: 300


    - name: Verify services are running
      command: docker ps
      register: docker_output
      failed_when: docker_output.rc != 0


    - name: Display running containers
      debug:
        var: docker_output.stdout_lines