- name: Set system timezone
  timezone:
    name: "{{ timezone  }}"

- name: Set JVM-friendly file descriptor limits
  pam_limits:
    domain: '*'
    limit_type: '-'
    limit_item: nofile
    value: "{{  jvm_nofile_limit  }}"

- name: Harden sshd config
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: /usr/sbin/sshd -t -f %s
  notify: restart sshd

- name: Install and configure fail2ban
  apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Deploy fail2ban jail config
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban

- name: Ensure fail2ban is enabled and started
  systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Harden kernel network parameters
  sysctl:
    name: "{{ item.key  }}"
    value: "{{  item.value  }}"
    state: present
    reload: true
  loop:
    - {key: net.ipv4.tcp_syncookies,               value: "1"}
    - {key: net.ipv4.conf.all.rp_filter,           value: "1"}
    - {key: net.ipv4.icmp_echo_ignore_broadcasts,  value: "1"}
    - {key: net.ipv4.conf.all.disable_ipv6,        value: "1"}

- name: Remove unnecessary packages
  apt:
    name:
      - telnet
      - rsh-client
    state: absent
    purge: true