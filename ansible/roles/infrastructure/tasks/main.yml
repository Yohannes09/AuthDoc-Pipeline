- name: Ensure /opt/infra directory exists on host
  file:
    path: /opt/infra
    state: directory
    mode: '0755'

- name: Copy infra docker-compose.yml to host
  copy:
    src: docker-compose.yml
    dest: /opt/infra/docker-compose.yml
    owner: root
    group: root
    mode: '0644'

- name: Deploy infra stack (Redis + Kafka)
  community.docker.docker_compose:
    project_src: /opt/infra
    state: present
    restarted: true